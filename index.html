<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock · flags & more</title>
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- flag-icons CDN (real flags) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --surface-2: #f9fafc;
            --border: #e4e7ec;
            --text: #111827;
            --text-light: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #ef4444;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --radius: 18px;
            --transition: 0.25s ease;
        }

        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #273449;
            --border: #334155;
            --text: #f8fafc;
            --text-light: #cbd5e1;
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .container {
            width: min(1250px, 92%);
            margin: auto;
        }

        /* HEADER */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 26px 0;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
        }

        .header p {
            margin-top: 6px;
            color: var(--text-light);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-actions button {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            font-weight: 700;
        }

        .header-actions button:hover {
            background: var(--primary);
            color: white;
        }

        /* MAIN */
        main {
            padding: 40px 0 80px;
        }

        section {
            margin-top: 45px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .section-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
        }

        /* SEARCH */
        .search-section {
            position: relative;
        }

        #searchInput {
            width: 100%;
            height: 60px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            padding: 0 22px;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }

        #searchInput::placeholder {
            color: var(--text-light);
        }

        #searchInput:focus {
            border-color: var(--primary);
        }

        #searchResults {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--shadow);
            max-height: 420px;
            overflow-y: auto;
            z-index: 1000;
        }

        .search-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            cursor: pointer;
            transition: var(--transition);
        }

        .search-item:hover {
            background: rgba(37, 99, 235, 0.08);
        }

        .search-flag {
            width: 40px;
            font-size: 1.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* real flag via flag-icons */
        .search-flag .fi {
            font-size: 2rem;
            border-radius: 4px;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        .search-country {
            font-weight: 700;
            font-size: 1rem;
        }

        .search-city {
            margin-top: 3px;
            color: var(--text-light);
            font-size: 0.92rem;
        }

        #searchResults::-webkit-scrollbar {
            width: 8px;
        }

        #searchResults::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }

        /* CLOCK GRID */
        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* CLOCK CARD */
        .clock-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow);
            animation: fadeIn 0.35s ease;
        }

        .clock-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.15);
        }

        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #2563eb, #4f46e5, #06b6d4);
        }

        .clock-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .flag-wrap {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            flex-shrink: 0;
        }

        .flag-wrap .fi {
            font-size: 2.6rem;
            border-radius: 6px;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.06);
        }

        .country {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
        }

        .city {
            margin-top: 5px;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .time {
            font-size: 2.35rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text);
            margin-bottom: 10px;
        }

        .date {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .utc {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.08);
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .remove-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            font-size: 1.2rem;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock-card:hover .remove-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .remove-btn:hover {
            transform: scale(1.1);
        }

        .empty {
            width: 100%;
            padding: 50px 20px;
            border-radius: 18px;
            border: 2px dashed var(--border);
            background: var(--surface);
            text-align: center;
            color: var(--text-light);
            font-size: 1rem;
        }

        .am-pm {
            font-size: 0.65em;
            font-weight: 600;
            margin-left: 4px;
            opacity: 0.75;
            text-transform: uppercase;
            vertical-align: middle;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* responsive */
        @media (max-width: 768px) {
            .header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .header-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .header h1 {
                font-size: 1.7rem;
            }

            .header p {
                font-size: 0.95rem;
            }

            .clock-grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .time {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                width: 94%;
            }

            .header-actions button {
                width: 42px;
                height: 42px;
            }

            .flag-wrap {
                width: 48px;
                height: 48px;
            }

            .time {
                font-size: 1.8rem;
            }
        }

        /* dark refinements */
        body.dark .clock-card {
            background: rgba(30, 41, 59, 0.95);
        }

        body.dark .flag-wrap {
            background: #334155;
        }

        body.dark .utc {
            background: rgba(37, 99, 235, 0.18);
        }

        body.dark #searchResults {
            background: var(--surface);
        }

        body.dark .empty {
            background: var(--surface);
        }

        body.dark::-webkit-scrollbar-thumb {
            background: #475569;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }

        ::selection {
            background: #2563eb;
            color: white;
        }

        /* =====================================================
   ALL COUNTRIES GRID - Compact
===================================================== */
        .all-clocks-grid {
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .all-clocks-grid .clock-card {
            padding: 16px;
            animation: fadeIn 0.3s ease;
        }

        .all-clocks-grid .clock-card::before {
            height: 3px;
        }

        .all-clocks-grid .flag-wrap {
            width: 40px;
            height: 40px;
        }

        .all-clocks-grid .flag-wrap .fi {
            font-size: 1.8rem;
        }

        .all-clocks-grid .country {
            font-size: 0.95rem;
        }

        .all-clocks-grid .city {
            font-size: 0.8rem;
        }

        .all-clocks-grid .time {
            font-size: 1.8rem;
        }

        .all-clocks-grid .date {
            font-size: 0.8rem;
        }

        .all-clocks-grid .utc {
            font-size: 0.7rem;
            padding: 3px 10px;
        }

        .all-clocks-grid .clock-header {
            gap: 12px;
            margin-bottom: 12px;
        }

        /* Scrollable container for all countries */
        .all-countries-wrapper {
            max-height: 800px;
            overflow-y: auto;
            padding-right: 8px;
            scroll-behavior: smooth;
        }

        .all-countries-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .all-countries-wrapper::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 999px;
        }

        /* Show more/less button */
        .show-toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 999px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .show-toggle-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }

        .show-toggle-btn svg {
            transition: transform 0.3s ease;
        }

        .show-toggle-btn.active svg {
            transform: rotate(180deg);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .all-clocks-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 12px;
            }

            .all-clocks-grid .clock-card {
                padding: 12px;
            }

            .all-clocks-grid .flag-wrap {
                width: 32px;
                height: 32px;
            }

            .all-clocks-grid .flag-wrap .fi {
                font-size: 1.4rem;
            }

            .all-clocks-grid .time {
                font-size: 1.4rem;
            }
        }

        @media (max-width: 480px) {
            .all-clocks-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading spinner for all countries */
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: var(--text-light);
            gap: 12px;
        }

        .loading-spinner::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="container">
            <div class="header-top">
                <div>
                    <h1>🌍 World Clock</h1>
                    <p>Live time from every country · real flags</p>
                </div>
                <div class="header-actions">
                    <button id="timeFormatBtn">24H</button>
                    <button id="themeBtn">🌙</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- SEARCH -->
        <section class="search-section">
            <input id="searchInput" type="text" placeholder="Search country or city..." autocomplete="off">
            <div id="searchResults"></div>
        </section>

        <!-- LOCAL -->
        <section>
            <div class="section-header">
                <h2>📍 My Local Time</h2>
            </div>
            <div id="localClock" class="clock-grid"></div>
        </section>

        <!-- FAVORITES -->
        <section>
            <div class="section-header">
                <h2>⭐ Favorites</h2>
            </div>
            <div id="favoriteClocks" class="clock-grid"></div>
        </section>

        <!-- POPULAR -->
        <section>
            <div class="section-header">
                <h2>🌎 Popular Cities</h2>
            </div>
            <div id="popularClocks" class="clock-grid"></div>
        </section>

        <!-- ALL COUNTRIES -->
        <section>
            <div class="section-header">
                <h2>🌏 All Countries</h2>
                <span id="countryCount" style="font-size:0.9rem; color: var(--text-light); font-weight: 500;"></span>
            </div>
            <div id="allClocks" class="all-clocks-grid"></div>
        </section>
    </main>

    <!-- TEMPLATES -->
    <template id="clockTemplate">
        <article class="clock-card">
            <button class="remove-btn">×</button>
            <div class="clock-header">
                <div class="flag-wrap"><span class="fi"></span></div>
                <div>
                    <h3 class="country"></h3>
                    <p class="city"></p>
                </div>
            </div>
            <div class="time"></div>
            <div class="date"></div>
            <div class="utc"></div>
        </article>
    </template>

    <template id="searchTemplate">
        <div class="search-item">
            <span class="search-flag"><span class="fi"></span></span>
            <div>
                <div class="search-country"></div>
                <div class="search-city"></div>
            </div>
        </div>
    </template>

            const dayPeriod = parts.find(p => p.type === 'dayPeriod')?.value || '';
            if (is24Hour) return `${hour}:${minute}:${second}`;
            return `${hour}:${minute}:${second} <span class="am-pm">${dayPeriod}</span>`;
        }

        function formatDate(timezone) {
            return new Intl.DateTimeFormat([], {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: timezone
            }).format(new Date());
        }

        function getUTCOffset(timezone) {
            const now = new Date();
            const utc = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
            const target = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
            const diff = (target - utc) / 60000;
            const sign = diff >= 0 ? '+' : '-';
            const abs = Math.abs(diff);
            const hours = Math.floor(abs / 60);
            const minutes = abs % 60;
            return `UTC${sign}${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
        }

        function findCountry(keyword) {
            keyword = keyword.trim().toLowerCase();
            return countries.filter(c =>
                c.country.toLowerCase().includes(keyword) ||
                c.city.toLowerCase().includes(keyword) ||
                c.aliases.some(a => a.includes(keyword))
            );
        }

        function getFavorites() { return JSON.parse(localStorage.getItem('favoriteClocks')) ?? []; }
        function saveFavorites(f) { localStorage.setItem('favoriteClocks', JSON.stringify(f)); }

        function getTheme() { return localStorage.getItem('theme') ?? 'light'; }
        function applyTheme(theme) { document.body.classList.toggle('dark', theme === 'dark'); localStorage.setItem('theme', theme); }
        function toggleTheme() { applyTheme(getTheme() === 'light' ? 'dark' : 'light'); }

        function toggleTimeFormat() { is24Hour = !is24Hour; localStorage.setItem('worldClock24Hour', JSON.stringify(is24Hour)); }

        function getLocalTimezone() { return Intl.DateTimeFormat().resolvedOptions().timeZone; }

        function getCountryFromTimezone(tz) { return countries.find(c => c.timezone === tz); }

        function sortCountries() { countries.sort((a, b) => a.country.localeCompare(b.country)); }

        const popularCities = [
            'Asia/Dhaka', 'Asia/Tokyo', 'Europe/London', 'Europe/Paris', 'Europe/Berlin',
            'America/New_York', 'America/Chicago', 'America/Los_Angeles', 'America/Toronto',
            'Asia/Dubai', 'Asia/Singapore', 'Asia/Shanghai', 'Asia/Kolkata', 'Australia/Sydney'
        ];

        // ---------- DOM ----------
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const localClock = document.getElementById('localClock');
        const favoriteClocks = document.getElementById('favoriteClocks');
        const popularClocks = document.getElementById('popularClocks');
        const clockTemplate = document.getElementById('clockTemplate');
        const searchTemplate = document.getElementById('searchTemplate');
        const themeBtn = document.getElementById('themeBtn');
        const timeFormatBtn = document.getElementById('timeFormatBtn');

        let favorites = getFavorites();
        let renderedClocks = [];
        let localTimezone = getLocalTimezone();

        // ---------- CREATE CARD ----------
        function createClockCard(data, removable = false) {
            const clone = clockTemplate.content.cloneNode(true);
            const card = clone.querySelector('.clock-card');
            const removeBtn = clone.querySelector('.remove-btn');

            // flag
            const flagSpan = clone.querySelector('.flag-wrap .fi');
            if (data.flag) {
                flagSpan.className = `fi fi-${data.flag}`;
            }

            clone.querySelector('.country').textContent = data.country;
            clone.querySelector('.city').textContent = data.city;
            clone.querySelector('.time').dataset.timezone = data.timezone;
            clone.querySelector('.date').dataset.timezone = data.timezone;
            clone.querySelector('.utc').textContent = getUTCOffset(data.timezone);

            if (removable) {
                removeBtn.addEventListener('click', () => {
                    favorites = favorites.filter(tz => tz !== data.timezone);
                    saveFavorites(favorites);
                    renderFavorites();
                });
            } else {
                removeBtn.remove();
            }

            renderedClocks.push({
                time: clone.querySelector('.time'),
                date: clone.querySelector('.date'),
                timezone: data.timezone
            });
            return clone;
        }

        function updateClocks() {
            renderedClocks.forEach(clock => {
                clock.time.innerHTML = formatTime(clock.timezone);
                clock.date.textContent = formatDate(clock.timezone);
            });
        }

        function renderLocalClock() {
            localClock.innerHTML = '';
            const place = getCountryFromTimezone(localTimezone);
            if (!place) return;
            localClock.appendChild(createClockCard(place));
        }

        function renderFavorites() {
            favoriteClocks.innerHTML = '';
            renderedClocks = renderedClocks.filter(c => c.timezone === localTimezone);
            if (favorites.length === 0) {
                favoriteClocks.innerHTML = `<div class="empty">No favorite clocks yet.</div>`;
                return;
            }
            favorites.forEach(tz => {
                const place = getCountryFromTimezone(tz);
                if (!place) return;
                favoriteClocks.appendChild(createClockCard(place, true));
            });
        }

        function renderPopular() {
            popularClocks.innerHTML = '';
            popularCities.forEach(tz => {
                const place = getCountryFromTimezone(tz);
                if (!place) return;
                popularClocks.appendChild(createClockCard(place));
            });
        }

        /* =========================================================
        RENDER ALL COUNTRIES
        ========================================================= */

        let showAllCountries = false;
        const ALL_COUNTRIES_LIMIT = 24; // Show first 24 by default

        function renderAllCountries() {
            const container = document.getElementById('allClocks');
            const countDisplay = document.getElementById('countryCount');

            if (!container) return;

            container.innerHTML = '';

            // Sort countries by country name for better display
            const sortedCountries = [...countries].sort((a, b) => a.country.localeCompare(b.country));

            // Update count
            if (countDisplay) {
                countDisplay.textContent = `${sortedCountries.length} locations`;
            }

            // Determine which countries to show
            const displayCountries = showAllCountries
                ? sortedCountries
                : sortedCountries.slice(0, ALL_COUNTRIES_LIMIT);

            // Create wrapper for scrolling
            const wrapper = document.createElement('div');
            wrapper.className = 'all-countries-wrapper';

            // Create grid inside wrapper
            const grid = document.createElement('div');
            grid.className = 'clock-grid all-clocks-grid';

            // Track rendered clocks for this section
            const allRendered = [];

            displayCountries.forEach((place, index) => {
                const clone = clockTemplate.content.cloneNode(true);
                const card = clone.querySelector('.clock-card');
                const removeBtn = clone.querySelector('.remove-btn');

                // Remove remove button (no favorites in all countries view)
                if (removeBtn) removeBtn.remove();

                // Set flag
                const flagSpan = clone.querySelector('.flag-wrap .fi');
                if (place.flag) {
                    flagSpan.className = `fi fi-${place.flag}`;
                }

                // Set content
                clone.querySelector('.country').textContent = place.country;
                clone.querySelector('.city').textContent = place.city;
                clone.querySelector('.time').dataset.timezone = place.timezone;
                clone.querySelector('.date').dataset.timezone = place.timezone;
                clone.querySelector('.utc').textContent = getUTCOffset(place.timezone);

                // Add click to add to favorites
                card.style.cursor = 'pointer';
                card.addEventListener('click', () => {
                    if (!favorites.includes(place.timezone)) {
                        favorites.push(place.timezone);
                        saveFavorites(favorites);
                        renderFavorites();
                        // Visual feedback
                        card.style.borderColor = 'var(--primary)';
                        card.style.transform = 'scale(0.98)';
                        setTimeout(() => {
                            card.style.borderColor = '';
                            card.style.transform = '';
                        }, 300);
                    }
                });

                // Add tooltip
                card.title = `Click to add ${place.country} (${place.city}) to favorites`;

                grid.appendChild(clone);

                // Add to rendered clocks
                allRendered.push({
                    time: clone.querySelector('.time'),
                    date: clone.querySelector('.date'),
                    timezone: place.timezone
                });
            });

            wrapper.appendChild(grid);
            container.appendChild(wrapper);

            // Add to main renderedClocks for updates
            renderedClocks = [...renderedClocks, ...allRendered];

            // Add show more/less button if there are more countries than limit
            if (sortedCountries.length > ALL_COUNTRIES_LIMIT) {
                const toggleDiv = document.createElement('div');
                toggleDiv.style.cssText = 'text-align: center; margin-top: 20px;';

                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'show-toggle-btn';
                toggleBtn.innerHTML = showAllCountries
                    ? 'Show Less ↑'
                    : `Show All (${sortedCountries.length} locations) ↓`;

                toggleBtn.addEventListener('click', () => {
                    showAllCountries = !showAllCountries;
                    // Remove all rendered clocks from this section before re-rendering
                    renderedClocks = renderedClocks.filter(clock =>
                        !allRendered.some(r => r.time === clock.time)
                    );
                    renderAllCountries();
                });

                toggleDiv.appendChild(toggleBtn);
                container.appendChild(toggleDiv);
            }
        }

        // ---------- SEARCH ----------
        function clearSearchResults() {
            searchResults.innerHTML = '';
            searchResults.style.display = 'none';
        }

        function renderSearchResults(results) {
            clearSearchResults();
            if (!results.length) return;
            results.slice(0, 20).forEach(place => {
                const clone = searchTemplate.content.cloneNode(true);
                const flagSpan = clone.querySelector('.search-flag .fi');
                if (place.flag) flagSpan.className = `fi fi-${place.flag}`;
                clone.querySelector('.search-country').textContent = place.country;
                clone.querySelector('.search-city').textContent = place.city;
                clone.querySelector('.search-item').addEventListener('click', () => {
                    if (!favorites.includes(place.timezone)) {
                        favorites.push(place.timezone);
                        saveFavorites(favorites);
                        renderFavorites();
                    }
                    searchInput.value = '';
                    clearSearchResults();
                });
                searchResults.appendChild(clone);
            });
            searchResults.style.display = 'block';
        }

        function performSearch(keyword) {
            keyword = keyword.trim();
            if (!keyword) { clearSearchResults(); return; }
            renderSearchResults(findCountry(keyword));
        }

        // events
        searchInput.addEventListener('input', e => performSearch(e.target.value));
        searchInput.addEventListener('focus', () => { if (searchInput.value.trim()) performSearch(searchInput.value); });
        searchInput.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            const results = findCountry(searchInput.value);
            if (!results.length) return;
            const place = results[0];
            if (!favorites.includes(place.timezone)) {
                favorites.push(place.timezone);
                saveFavorites(favorites);
                renderFavorites();
            }
            searchInput.value = '';
            clearSearchResults();
        });
        document.addEventListener('click', e => {
            if (!searchResults.contains(e.target) && !searchInput.contains(e.target)) clearSearchResults();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') clearSearchResults(); });

        // ---------- RENDER APP ----------
        function renderApp() {
            renderedClocks = [];
            renderLocalClock();
            renderFavorites();
            renderPopular();
            renderAllCountries();
            updateClocks();
        }

        function startClockUpdates() {
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        function refreshFavorites() {
            favorites = getFavorites();
            renderFavorites();
        }

        // ---------- THEME & FORMAT ----------
        applyTheme(getTheme());
        themeBtn.textContent = getTheme() === 'dark' ? '☀️' : '🌙';
        themeBtn.addEventListener('click', () => {
            toggleTheme();
            themeBtn.textContent = getTheme() === 'dark' ? '☀️' : '🌙';
        });

        timeFormatBtn.textContent = is24Hour ? '24H' : '12H';
        timeFormatBtn.addEventListener('click', () => {
            toggleTimeFormat();
            timeFormatBtn.textContent = is24Hour ? '24H' : '12H';
            updateClocks();
        });

        // ---------- START ----------
        sortCountries();
        renderApp();
        startClockUpdates();

        // visibility
        document.addEventListener('visibilitychange', () => { if (!document.hidden) updateClocks(); });
        window.addEventListener('focus', updateClocks);
    </script>
</body>

</html>
